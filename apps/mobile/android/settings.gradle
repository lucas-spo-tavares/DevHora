import groovy.json.JsonSlurper

def mobileDir = rootDir.parentFile

def findPackageDir = { String packageName ->
  def relativePath = packageName.split('/').join(File.separator)
  def searchRoots = [
    new File(mobileDir, "node_modules"),
    new File(mobileDir, "node_modules/react-native/node_modules"),
    new File(mobileDir, "node_modules/expo/node_modules")
  ]

  for (def searchRoot : searchRoots) {
    def candidate = new File(searchRoot, relativePath)
    if (candidate.isDirectory()) {
      return candidate
    }
  }

  throw new GradleException("Nao foi possivel localizar o pacote ${packageName} a partir de ${mobileDir}.")
}

def reactNativePackagePath = findPackageDir("react-native")
def reactNativeGradlePluginPath = findPackageDir("@react-native/gradle-plugin")
def expoPackagePath = findPackageDir("expo")

def getRNMinorVersion() {
  def version = new JsonSlurper().parse(new File(reactNativePackagePath, "package.json")).version

  def coreVersion = version.split("-")[0]
  def (major, minor, patch) = coreVersion.tokenize('.').collect { it.toInteger() }

  return minor
}

